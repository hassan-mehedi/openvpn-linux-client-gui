name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libgirepository1.0-dev \
            python3-gi \
            python3-dbus \
            libsecret-1-dev \
            xvfb

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --dev

      - name: Run unit and integration tests
        run: uv run pytest tests/unit tests/integration -v --tb=short

      - name: Run E2E tests under Xvfb
        run: xvfb-run -a uv run pytest tests/e2e -v --tb=short -m e2e

  packaging-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify packaging assets
        run: |
          test -f packaging/desktop/openvpn3-client.desktop.in
          test -f packaging/icons/com.openvpn3.clientlinux.svg
          test -f packaging/uri-handler/openvpn3-client-linux.xml
          test -f packaging/systemd/openvpn3-client-linux.service
          test -f packaging/polkit/com.openvpn3.clientlinux.policy
